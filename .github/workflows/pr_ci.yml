name: Pull request checks
on: pull_request

jobs:
  lint:
    name: "Static code analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.1.0
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Lint analysis
        run: flutter analyze

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.1.0
        with:
          submodules: recursive
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Init submodules in pub cache
        run: |
              find ~/.pub-cache/git -name ".git" -type d -exec sh -c '
                   repo=$(dirname "$1")
                   git -C "$repo" submodule update --init --recursive || true
              ' _ {} \;
      - name: Run tests
        run: flutter test
