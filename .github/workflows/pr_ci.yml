name: Pull request checks
on: pull_request

jobs:
  lint:
    name: "Static code analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.1.0
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Lint analysis
        run: flutter analyze

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.1.0
        with:
          submodules: recursive
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: find ~/.pub-cache/git -type d -name ".git" | while read d; do repo=$(dirname "$d") git -C "$repo" submodule update --init --recursive || true done
      - name: Run tests
        run: flutter test
